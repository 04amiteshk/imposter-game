<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8" />
<title>IMPOSTER</title>
<style>
body{margin:0;font-family:sans-serif;background:#0b0b12;color:#fff}
.center{height:100vh;display:flex;flex-direction:column;justify-content:center;align-items:center}
button{padding:14px;border:0;border-radius:10px;background:#ff2441;color:#fff;font-weight:700;width:200px}
input{padding:10px;margin:6px;border-radius:8px;border:1px solid #333;background:#111;color:#fff}
#debug{color:yellow;margin-top:10px;font-size:12px;white-space:pre-wrap}
</style>
</head>

<body>

<div class="center">
  <h1>IMPOSTER</h1>

  <input id="hostName" placeholder="Host name"/>
  <input id="players" placeholder="Alice, Bob, Charlie"/>

  <button onclick="createGame()">HOST GAME</button>

  <div id="debug"></div>
</div>

<!-- FIREBASE COMPAT (IMPORTANT FIX) -->
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-database-compat.js"></script>

<script>
/* ================= FIREBASE ================= */
const firebaseConfig = {
  databaseURL: "YOUR_REAL_FIREBASE_DB_URL"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.database();

/* ================= DEBUG ================= */
function log(msg){
  document.getElementById("debug").innerText += "\n" + msg;
}

/* ================= HOST GAME ================= */
async function createGame(){
  try {
    log("Button clicked");

    const host = document.getElementById("hostName").value.trim();
    if(!host){
      alert("Enter host name");
      return;
    }

    const raw = document.getElementById("players").value;
    const players = raw.split(",").map(x=>x.trim()).filter(Boolean);

    const code = Math.random().toString(36).substring(2,7).toUpperCase();

    log("Creating game: " + code);

    await db.ref("games/" + code).set({
      host,
      players: [
        {name:host,taken:true},
        ...players.map(p=>({name:p,taken:false}))
      ],
      status:"lobby",
      joined:{[host]:true}
    });

    alert("Game created: " + code);

  } catch (e) {
    console.log(e);
    log("ERROR: " + e.message);
  }
}
</script>

</body>
</html>
