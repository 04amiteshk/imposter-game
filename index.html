<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no" />
<title>IMPOSTER · Party Word Game</title>

<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet">

<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{height:100%}
body{
  background:#09090F;
  color:#fff;
  font-family:'DM Sans',sans-serif;
  overscroll-behavior:none;
  -webkit-font-smoothing:antialiased;
}

.screen{display:none;min-height:100svh;flex-direction:column;max-width:440px;margin:0 auto}
.screen.on{display:flex}
.center{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:28px 24px}
.pad{flex:1;overflow-y:auto;padding:24px;display:flex;flex-direction:column}

.title{font-family:'Bebas Neue',sans-serif;font-size:48px;letter-spacing:4px}

.btn{background:#FF2441;color:#fff;border:none;border-radius:14px;padding:16px;font-size:16px;font-weight:600;cursor:pointer;width:100%}
.btn.off{opacity:.4;pointer-events:none}
.btn2{background:rgba(255,255,255,0.05);color:#fff;border:1px solid rgba(255,255,255,0.1);border-radius:14px;padding:14px;width:100%}

.inp{background:rgba(255,255,255,0.06);border:1px solid rgba(255,255,255,0.1);border-radius:12px;padding:13px 16px;color:#fff;width:100%}

.tags{display:flex;flex-wrap:wrap;gap:8px;margin-top:12px}
.tag{background:rgba(255,255,255,0.07);border-radius:999px;padding:6px 10px;font-size:13px}

.card{background:linear-gradient(150deg,#14141f,#0c0c16);border-radius:18px;padding:20px;text-align:center}

.code{font-size:42px;font-family:'Bebas Neue'}
</style>
</head>
<body>

<!-- ================= HOME ================= -->
<div id="home" class="screen on">
  <div class="center">
    <div class="title">IMPOSTER</div>
    <button class="btn" onclick="go('setup')">Host Game</button>
    <button class="btn2" onclick="go('join')">Join Game</button>
  </div>
</div>

<!-- ================= SETUP ================= -->
<div id="setup" class="screen">
  <div class="pad">
    <button class="btn2" onclick="go('home')">Back</button>
    <h2 style="margin:20px 0">Setup</h2>

    <div style="display:flex;gap:10px">
      <input id="p" class="inp" placeholder="Player name" onkeydown="if(event.key==='Enter')addPlayer()" />
      <button class="btn" onclick="addPlayer()">+</button>
    </div>

    <div id="tags" class="tags"></div>

    <button id="create" class="btn off" onclick="createGame()" style="margin-top:auto">Create Game</button>
  </div>
</div>

<!-- ================= LOBBY ================= -->
<div id="lobby" class="screen">
  <div class="pad">
    <button class="btn2" onclick="cancel()">Exit</button>

    <div class="card" style="margin-top:20px">
      <div>GAME CODE</div>
      <div class="code" id="code"></div>
    </div>

    <div id="players" style="margin-top:20px"></div>

    <button class="btn" onclick="startGame()">Start</button>
  </div>
</div>

<!-- ================= JOIN ================= -->
<div id="join" class="screen">
  <div class="center">
    <input id="codeIn" class="inp" placeholder="GAME CODE" />
    <input id="nameIn" class="inp" placeholder="Your name" style="margin-top:10px" />
    <button class="btn" onclick="joinGame()">Join</button>
    <button class="btn2" onclick="go('home')">Back</button>
  </div>
</div>

<!-- ================= ROLE ================= -->
<div id="role" class="screen">
  <div class="center">
    <h2 id="rname"></h2>
    <div class="card" style="margin-top:20px">
      <div id="roleText"></div>
      <div id="word"></div>
    </div>
    <button class="btn2" onclick="go('home')">Exit</button>
  </div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getDatabase, ref, set, get, update, onValue } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-database.js";

const firebaseConfig = {
  databaseURL: "https://imposter-game-8pc-default-rtdb.firebaseio.com"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);

let players = [];
let code = null;
let me = null;

function go(id){
  document.querySelectorAll('.screen').forEach(s=>s.classList.remove('on'));
  document.getElementById(id).classList.add('on');
}

window.addPlayer = () => {
  const v = document.getElementById('p').value.trim();
  if(!v) return;
  players.push(v);
  document.getElementById('p').value='';
  render();
};

function render(){
  const el = document.getElementById('tags');
  el.innerHTML = players.map(p=>`<div class='tag'>${p}</div>`).join('');
  document.getElementById('create').classList.toggle('off', players.length<3);
}

window.createGame = async () => {
  code = Math.random().toString(36).substring(2,8).toUpperCase();
  await set(ref(db,'games/'+code),{
    players,
    status:'lobby',
    joined:{},
    roles:{},
    imposters:1
  });

  document.getElementById('code').innerText = code;
  go('lobby');

  onValue(ref(db,'games/'+code), snap => {
    const d = snap.val();
    if(!d) return;

    document.getElementById('players').innerHTML = (d.players||[]).map(p=>
      `<div>${p} ${d.joined?.[p]?"✓":""}</div>`
    ).join('');

    if(d.status==='started' && me){
      const r = d.roles[me];
      document.getElementById('rname').innerText = me;
      document.getElementById('roleText').innerText = r.role;
      document.getElementById('word').innerText = r.word || 'IMPOSTER';
      go('role');
    }
  });
};

window.joinGame = async () => {
  const c = document.getElementById('codeIn').value.toUpperCase();
  const n = document.getElementById('nameIn').value.trim();
  me = n;

  const snap = await get(ref(db,'games/'+c));
  if(!snap.exists()) return alert('Game not found');

  await update(ref(db,'games/'+c+'/joined'),{[n]:true});
  code = c;

  onValue(ref(db,'games/'+c), snap => {
    const d = snap.val();
    if(d.status==='started'){
      const r = d.roles[n];
      document.getElementById('rname').innerText = n;
      document.getElementById('roleText').innerText = r.role;
      document.getElementById('word').innerText = r.word || 'IMPOSTER';
      go('role');
    }
  });

  go('role');
};

window.startGame = async () => {
  const snap = await get(ref(db,'games/'+code));
  const d = snap.val();

  const shuffled = [...d.players].sort(()=>Math.random()-0.5);
  const roles = {};

  shuffled.forEach((p,i)=>{
    roles[p] = {
      role: i<d.imposters ? 'imposter':'crew',
      word: 'WORD'
    };
  });

  await update(ref(db,'games/'+code),{
    roles,
    status:'started'
  });
};

window.cancel = () => go('home');
</script>

</body>
</html>
