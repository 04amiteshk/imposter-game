<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>IMPOSTER</title>

<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet">

<style>
body{margin:0;font-family:DM Sans;background:#0b0b12;color:#fff}
.screen{display:none;min-height:100vh;max-width:420px;margin:0 auto;flex-direction:column}
.screen.on{display:flex}
.center{flex:1;display:flex;flex-direction:column;justify-content:center;align-items:center;padding:20px}
.title{font-family:'Bebas Neue';font-size:54px;color:#ff2441}
.btn{padding:14px;border:0;border-radius:12px;background:#ff2441;color:#fff;width:100%;font-weight:600;margin-top:10px}
.btn2{padding:12px;border-radius:12px;background:#222;color:#fff;border:1px solid #333;width:100%}
.inp{width:100%;padding:12px;border-radius:10px;border:1px solid #333;background:#111;color:#fff}
#debug{font-size:12px;color:#ff8080;margin-top:10px;white-space:pre-wrap}
</style>
</head>

<body>

<!-- HOME -->
<div id="home" class="screen on">
  <div class="center">
    <div class="title">IMPOSTER</div>

    <button class="btn" onclick="createGame()">Host Game</button>
    <button class="btn2" onclick="go('host')">Go to Host Setup</button>

    <div id="debug"></div>
  </div>
</div>

<!-- HOST SETUP -->
<div id="host" class="screen">
  <div class="center">
    <input id="hostName" class="inp" placeholder="Your name"/>
    <input id="playerList" class="inp" placeholder="Player1, Player2, Player3"/>
    <button class="btn" onclick="createGame()">Create Game</button>
    <button class="btn2" onclick="go('home')">Back</button>
  </div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import {
  getDatabase,
  ref,
  set
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-database.js";

/* ================= FIREBASE ================= */
const firebaseConfig = {
  databaseURL: "YOUR_REAL_FIREBASE_DB_URL"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);

/* ================= STATE ================= */
let CODE = null;

/* ================= UTIL ================= */
const $ = id => document.getElementById(id);

function log(msg){
  $("debug").innerText += "\n" + msg;
}

function go(id){
  document.querySelectorAll('.screen').forEach(s=>s.classList.remove('on'));
  $(id).classList.add('on');
}

function genCode(){
  return Math.random().toString(36).substring(2,8).toUpperCase();
}

/* ================= CRITICAL FIXED FUNCTION ================= */
window.createGame = async function createGame(){

  try {
    log("createGame() triggered");

    const hostName = $("hostName")?.value?.trim();
    const listRaw = $("playerList")?.value;

    if(!hostName){
      alert("Enter host name first");
      return;
    }

    const list = (listRaw || "")
      .split(",")
      .map(x=>x.trim())
      .filter(Boolean);

    CODE = genCode();

    const players = [
      { name: hostName, taken: true },
      ...list.map(n => ({ name:n, taken:false }))
    ];

    log("Writing to Firebase...");

    await set(ref(db,"games/"+CODE),{
      players,
      host: hostName,
      joined: { [hostName]: true },
      status:"lobby"
    });

    log("Game created: " + CODE);

    alert("Game created: " + CODE);

  go('home');

  } catch (err) {
    console.error(err);
    log("ERROR: " + err.message);
    alert("Firebase error — check console");
  }
}

/* ================= NAV ================= */
window.go = go;

</script>

</body>
</html>
