<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>IMPOSTER</title>

<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet">

<style>
body{margin:0;font-family:DM Sans;background:#0b0b12;color:#fff}
.screen{display:none;min-height:100vh;max-width:420px;margin:0 auto;flex-direction:column}
.screen.on{display:flex}
.center{flex:1;display:flex;flex-direction:column;justify-content:center;align-items:center;padding:20px}
.pad{flex:1;display:flex;flex-direction:column;padding:20px}
.title{font-family:'Bebas Neue';font-size:54px;color:#ff2441;letter-spacing:3px}
.btn{padding:14px;border:0;border-radius:12px;background:#ff2441;color:#fff;width:100%;font-weight:600;margin-top:10px}
.btn2{padding:12px;border-radius:12px;background:#222;color:#fff;border:1px solid #333;width:100%}
.inp{width:100%;padding:12px;border-radius:10px;border:1px solid #333;background:#111;color:#fff}
select{width:100%;padding:12px;border-radius:10px;background:#111;color:#fff;border:1px solid #333}
.card{background:#151520;padding:20px;border-radius:16px;text-align:center}
.small{opacity:.6;font-size:13px}
</style>
</head>

<body>

<!-- HOME -->
<div id="home" class="screen on">
  <div class="center">
    <div class="title">IMPOSTER</div>
    <button class="btn" onclick="createGame()">Host Game</button>
    <button class="btn2" onclick="go('join')">Join Game</button>
  </div>
</div>

<!-- JOIN -->
<div id="join" class="screen">
  <div class="center">
    <input id="codeInput" class="inp" placeholder="Game Code"/>
    <button class="btn" onclick="findGame()">Find Game</button>
    <button class="btn2" onclick="go('home')">Back</button>
  </div>
</div>

<!-- NAME SELECT -->
<div id="name" class="screen">
  <div class="center">
    <div class="small">Select your name</div>
    <select id="nameSelect"></select>
    <button class="btn" onclick="joinGame()">Join</button>
  </div>
</div>

<!-- LOBBY -->
<div id="lobby" class="screen">
  <div class="pad">
    <h2>Lobby</h2>
    <div id="codeBox"></div>
    <div id="players"></div>
    <button class="btn" onclick="startGame()">Start Game</button>
  </div>
</div>

<!-- GAME -->
<div id="game" class="screen">
  <div class="center">
    <div class="card">
      <div id="role"></div>
      <div id="word"></div>
    </div>
  </div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import {
  getDatabase,
  ref,
  set,
  get,
  update,
  onValue
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-database.js";

/* ---------------- CONFIG ---------------- */
const firebaseConfig = {
  databaseURL: "YOUR_REAL_FIREBASE_DB_URL"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);

/* ---------------- STATE ---------------- */
let CODE = null;
let NAME = null;
let isHost = false;

/* ---------------- HELPERS ---------------- */
const $ = id => document.getElementById(id);

function go(id){
  document.querySelectorAll('.screen').forEach(s=>s.classList.remove('on'));
  $(id).classList.add('on');
}

function genCode(){
  return Math.random().toString(36).substring(2,8).toUpperCase();
}

/* ---------------- CREATE GAME (HOST AUTO JOINS) ---------------- */
async function createGame(){
  CODE = genCode();
  isHost = true;
  NAME = "Host";

  const players = ["Host","Player 1","Player 2","Player 3"];

  await set(ref(db,"games/"+CODE),{
    players,
    joined:{Host:true},
    status:"lobby"
  });

  go('lobby');
  $("codeBox").innerText = CODE;

  listenGame();
}

/* ---------------- FIND GAME ---------------- */
async function findGame(){
  const code = $("codeInput").value.toUpperCase();
  const snap = await get(ref(db,"games/"+code));

  if(!snap.exists()){
    alert("Game not found");
    return;
  }

  CODE = code;
  go('name');

  const data = snap.val();
  const select = $("nameSelect");
  select.innerHTML = "";

  data.players.forEach(p=>{
    const opt = document.createElement("option");
    opt.value = p;
    opt.innerText = p;
    select.appendChild(opt);
  });
}

/* ---------------- JOIN GAME ---------------- */
async function joinGame(){
  NAME = $("nameSelect").value;

  await update(ref(db,"games/"+CODE+"/joined"),{
    [NAME]:true
  });

  go('lobby');
  listenGame();
}

/* ---------------- LOBBY LISTENER ---------------- */
function listenGame(){
  onValue(ref(db,"games/"+CODE),(snap)=>{
    const data = snap.val();
    if(!data) return;

    $("players").innerHTML =
      data.players.map(p =>
        `<div>${p} ${data.joined?.[p] ? "✔️" : "⏳"}</div>`
      ).join("");
  });
}

/* ---------------- START GAME ---------------- */
async function startGame(){
  const snap = await get(ref(db,"games/"+CODE));
  const data = snap.val();

  const shuffled = [...data.players].sort(()=>Math.random()-0.5);
  const roles = {};
  const imposter = shuffled[0];

  shuffled.forEach(p=>{
    roles[p] = p === imposter ? "IMPOSTER" : "WORD: Banana";
  });

  await update(ref(db,"games/"+CODE),{
    roles,
    status:"started"
  });

  showGame();
}

/* ---------------- SHOW GAME ---------------- */
function showGame(){
  onValue(ref(db,"games/"+CODE),(snap)=>{
    const data = snap.val();
    if(!data?.roles) return;

    go('game');

    $("role").innerText = data.roles[NAME];
  });
}

/* expose */
window.createGame = createGame;
window.findGame = findGame;
window.joinGame = joinGame;
window.startGame = startGame;
window.go = go;

</script>
</body>
</html>
